<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration ArchiLocal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #2C2C2C;
    --gold-light: #444444;
    --dark: #FAFAFA;
    --dark-2: #F2F2F0;
    --dark-3: #EBEBEA;
    --cream: #1A1A1A;
    --text: #3A3A3A;
    --text-muted: #888888;
    --danger: #9D2F2F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 50% 60% at 90% 10%, rgba(44,44,44,0.05) 0%, transparent 60%),
      linear-gradient(160deg, #FAFAFA 0%, #F2F2F0 55%, #E8E8E4 100%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  a { color: inherit; }

  .admin-page {
    width: min(1180px, calc(100% - 48px));
    margin: 0 auto;
    padding: 42px 0 64px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    margin-bottom: 42px;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-decoration: none;
  }
  .brand span { color: var(--cream); font-style: italic; }

  .site-link,
  .button {
    border: 1px solid rgba(44,44,44,0.22);
    background: transparent;
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 12px 18px;
    cursor: pointer;
  }

  .hero {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 48px;
    align-items: end;
    margin-bottom: 42px;
  }

  .kicker {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  h1,
  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.05;
  }

  h1 { font-size: clamp(48px, 7vw, 84px); }
  h2 { font-size: 34px; margin-bottom: 22px; }

  .intro {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.8;
  }

  .status {
    border: 1px solid rgba(44,44,44,0.12);
    background: rgba(250,250,250,0.78);
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.7;
    padding: 16px 18px;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    gap: 28px;
    align-items: start;
  }

  .panel {
    background: rgba(250,250,250,0.88);
    border: 1px solid rgba(44,44,44,0.13);
    box-shadow: 0 24px 70px rgba(44,44,44,0.08);
    padding: 30px;
  }

  .form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }

  input,
  select,
  textarea {
    width: 100%;
    background: var(--dark-3);
    border: 1px solid rgba(44,44,44,0.12);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 14px 16px;
    outline: none;
  }

  textarea {
    min-height: 104px;
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: var(--gold);
  }

  .submit {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: none;
    background: var(--gold);
    color: #FAFAFA;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 18px 24px;
    cursor: pointer;
  }

  .submit:disabled,
  .button:disabled {
    opacity: 0.55;
    cursor: wait;
  }

  .projects {
    display: grid;
    gap: 14px;
  }

  .empty {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
  }

  .project-card {
    display: grid;
    grid-template-columns: 112px 1fr;
    gap: 16px;
    align-items: stretch;
    background: var(--dark-3);
    border: 1px solid rgba(44,44,44,0.08);
    padding: 12px;
  }

  .project-card img {
    width: 112px;
    height: 112px;
    object-fit: cover;
    background: var(--dark-2);
  }

  .project-body {
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 14px;
  }

  .project-meta {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .project-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 25px;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.1;
  }

  .project-details {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
    margin-top: 6px;
  }

  .project-actions {
    display: flex;
    justify-content: flex-end;
  }

  .danger {
    border-color: rgba(157,47,47,0.28);
    color: var(--danger);
  }

  @media (max-width: 900px) {
    .hero,
    .layout {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    .admin-page {
      width: min(100% - 32px, 1180px);
      padding-top: 28px;
    }
    .topbar {
      align-items: flex-start;
      flex-direction: column;
      margin-bottom: 34px;
    }
    .brand {
      font-size: 19px;
      letter-spacing: 0.22em;
    }
    .site-link,
    .button {
      width: 100%;
      text-align: center;
    }
    .panel {
      padding: 22px;
    }
    .form {
      grid-template-columns: 1fr;
    }
    .field.full,
    .submit {
      grid-column: auto;
    }
    input,
    select,
    textarea {
      font-size: 16px;
    }
    .project-card {
      grid-template-columns: 86px 1fr;
      gap: 12px;
    }
    .project-card img {
      width: 86px;
      height: 86px;
    }
    .project-name {
      font-size: 22px;
    }
    .project-actions {
      justify-content: stretch;
    }
  }

  @media (max-width: 420px) {
    .project-card {
      grid-template-columns: 1fr;
    }
    .project-card img {
      width: 100%;
      height: 180px;
    }
  }
</style>
</head>
<body>
<main class="admin-page">
  <div class="topbar">
    <a href="/" class="brand">ARCHI<span>Local</span></a>
    <a href="/" class="site-link">Voir le site</a>
  </div>

  <section class="hero">
    <div>
      <div class="kicker">Administration</div>
      <h1>Gérer les projets</h1>
    </div>
    <p class="intro">
      Ajoute les projets ArchiLocal, téléverse leurs photos sur ImgBB et supprime les projets qui ne doivent plus apparaître dans le portfolio public.
    </p>
  </section>

  <p class="status" id="status">Chargement de la configuration Vercel...</p>

  <section class="layout" style="margin-top: 28px;">
    <div class="panel">
      <h2>Ajouter</h2>
      <form class="form" id="projectForm">
        <div class="field">
          <label for="projectName">Nom du projet</label>
          <input type="text" id="projectName" placeholder="Villa Akpakpa" required>
        </div>
        <div class="field">
          <label for="projectCategory">Catégorie</label>
          <select id="projectCategory" required>
            <option value="résidentiel">Résidentiel</option>
            <option value="culturel">Culturel</option>
            <option value="commercial">Commercial</option>
          </select>
        </div>
        <div class="field">
          <label for="projectLocation">Lieu</label>
          <input type="text" id="projectLocation" placeholder="Cotonou">
        </div>
        <div class="field">
          <label for="projectYear">Année</label>
          <input type="number" id="projectYear" min="2000" max="2100" placeholder="2026">
        </div>
        <div class="field full">
          <label for="projectDetails">Détails</label>
          <textarea id="projectDetails" placeholder="Matériaux, surface, contexte du projet..."></textarea>
        </div>
        <div class="field full">
          <label for="projectPhotos">Photos</label>
          <input type="file" id="projectPhotos" accept="image/*" multiple required>
        </div>
        <button class="submit" id="submitButton" type="submit">
          Enregistrer
          <span>→</span>
        </button>
      </form>
    </div>

    <div class="panel">
      <h2>Projets publiés</h2>
      <div class="projects" id="projects"></div>
    </div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
  const DEFAULT_PROJECT_COLLECTION = 'archilocal_portfolio_projects';
  let db = null;
  let projectCollection = DEFAULT_PROJECT_COLLECTION;
  let imgbbUploadAvailable = false;
  let projects = [];

  const statusEl = document.getElementById('status');
  const form = document.getElementById('projectForm');
  const submitButton = document.getElementById('submitButton');
  const projectsEl = document.getElementById('projects');

  initializeAdmin();

  async function initializeAdmin() {
    setStatus('Chargement de la configuration Vercel...');
    try {
      const response = await fetch('/api/config', { cache: 'no-store' });
      const config = await response.json();

      if (!response.ok) {
        throw new Error(config.error || 'Configuration indisponible');
      }
      if (!window.firebase) {
        throw new Error('Firebase SDK indisponible');
      }

      if (!firebase.apps.length) {
        firebase.initializeApp(config.firebase);
      }

      db = firebase.firestore();
      projectCollection = config.projectCollection || DEFAULT_PROJECT_COLLECTION;
      imgbbUploadAvailable = Boolean(config.imgbbUploadAvailable);

      if (!imgbbUploadAvailable) {
        setStatus('Configuration incomplète : ajoute IMGBB_API_KEY dans Vercel.');
        return;
      }

      setStatus(`Connecté à Firestore. Collection : ${projectCollection}`);
      await loadProjects();
    } catch (error) {
      console.error(error);
      setStatus(`Erreur : ${error.message}`);
    }
  }

  async function loadProjects() {
    if (!db) return;
    const snapshot = await db.collection(projectCollection).orderBy('createdAt', 'desc').get();
    projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderProjects();
  }

  function renderProjects() {
    projectsEl.innerHTML = '';
    if (!projects.length) {
      projectsEl.innerHTML = '<p class="empty">Aucun projet ajouté pour le moment.</p>';
      return;
    }

    projects.forEach(project => {
      const card = document.createElement('article');
      const year = project.year || '';
      const imageUrl = Array.isArray(project.imageUrls) && project.imageUrls.length ? project.imageUrls[0] : '';
      card.className = 'project-card';
      card.innerHTML = `
        <img src="${escapeAttribute(imageUrl)}" alt="${escapeAttribute(project.name || 'Projet')}">
        <div class="project-body">
          <div>
            <div class="project-meta">${escapeHtml(project.category || 'Projet')} · ${escapeHtml(project.location || 'Bénin')} ${year ? '· ' + escapeHtml(String(year)) : ''}</div>
            <div class="project-name">${escapeHtml(project.name || 'Projet sans nom')}</div>
            <p class="project-details">${escapeHtml(project.details || 'Aucun détail renseigné')}</p>
          </div>
          <div class="project-actions">
            <button class="button danger" type="button" data-delete-id="${escapeAttribute(project.id)}">Supprimer</button>
          </div>
        </div>
      `;
      projectsEl.appendChild(card);
    });

    projectsEl.querySelectorAll('[data-delete-id]').forEach(button => {
      button.addEventListener('click', () => deleteProject(button.dataset.deleteId, button));
    });
  }

  form.addEventListener('submit', async event => {
    event.preventDefault();

    if (!db || !imgbbUploadAvailable) {
      setStatus('Configuration Vercel incomplète. Vérifie Firebase et IMGBB_API_KEY.');
      return;
    }

    const files = Array.from(document.getElementById('projectPhotos').files || []);
    if (!files.length) {
      setStatus('Ajoute au moins une photo pour ce projet.');
      return;
    }

    submitButton.disabled = true;
    setStatus('Upload des photos sur ImgBB...');

    try {
      const imageUrls = [];
      for (const file of files) {
        imageUrls.push(await uploadToImgBB(file));
      }

      const project = {
        name: document.getElementById('projectName').value.trim(),
        category: document.getElementById('projectCategory').value,
        location: document.getElementById('projectLocation').value.trim(),
        year: document.getElementById('projectYear').value.trim() || String(new Date().getFullYear()),
        details: document.getElementById('projectDetails').value.trim(),
        imageUrls,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      setStatus('Enregistrement dans Firestore...');
      await db.collection(projectCollection).add(project);
      form.reset();
      setStatus('Projet ajouté avec succès.');
      await loadProjects();
    } catch (error) {
      console.error(error);
      setStatus(`Erreur : ${error.message}`);
    } finally {
      submitButton.disabled = false;
    }
  });

  async function deleteProject(projectId, button) {
    if (!db || !projectId) return;
    const project = projects.find(item => item.id === projectId);
    const projectName = project?.name || 'ce projet';

    if (!confirm(`Supprimer définitivement ${projectName} ?`)) return;

    button.disabled = true;
    setStatus('Suppression du projet...');

    try {
      await db.collection(projectCollection).doc(projectId).delete();
      setStatus('Projet supprimé.');
      await loadProjects();
    } catch (error) {
      console.error(error);
      setStatus(`Erreur de suppression : ${error.message}`);
      button.disabled = false;
    }
  }

  async function uploadToImgBB(file) {
    const formData = new FormData();
    formData.append('image', file);

    const response = await fetch('/api/imgbb-upload', {
      method: 'POST',
      body: formData
    });
    const result = await response.json();
    if (!response.ok || !result.success) {
      throw new Error(result?.error?.message || 'Upload ImgBB impossible');
    }
    return result.url;
  }

  function setStatus(message) {
    statusEl.textContent = message;
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>'"]/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    }[char]));
  }

  function escapeAttribute(value) {
    return escapeHtml(value || '').replace(/`/g, '&#96;');
  }
</script>
</body>
</html>
